version: 2
updates:
  - package-ecosystem: npm
    directory: /cpe-web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major version bumps need manual review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
