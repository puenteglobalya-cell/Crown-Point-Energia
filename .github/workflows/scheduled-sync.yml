name: Scheduled data sync

# Vercel's own cron scheduler can silently fail to fire these routes (missing
# CRON_SECRET in Production, or a plan tier that caps/limits cron jobs) — this
# workflow calls the exact same endpoints from GitHub's infrastructure instead,
# once a day on weekdays, so the stock quote and CNV disclosures sync stays
# automatic regardless of Vercel's cron config.
on:
  schedule:
    - cron: '0 14 * * 1-5' # weekdays, 14:00 UTC (11:00 Argentina)
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab, any time

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync stock quote (/api/cron/stock)
        run: |
          curl -sS -f -X GET "${{ vars.SITE_URL }}/api/cron/stock" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: Sync CNV hechos relevantes (/api/cron/cnv-sync)
        run: |
          curl -sS -f -X GET "${{ vars.SITE_URL }}/api/cron/cnv-sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
