    <path d="&#xA;      M 168 740&#xA;      C 188 738, 208 742, 226 750&#xA;      L 244 762&#xA;      L 252 774&#xA;      C 252 784, 240 790, 224 792&#xA;      L 208 792&#xA;      C 192 790, 178 786, 168 778&#xA;      L 160 770&#xA;      C 156 760, 158 750, 168 740 Z" class="cc-country cc-stroke" stroke-width="1.5" stroke-linejoin="round"></path>

    
    <g class="cc-stroke" stroke-width="0.6" opacity="0.2" fill="none">
      <path d="M 198 120 L 392 145"></path>     
      <path d="M 188 180 L 414 200"></path>     
      <path d="M 184 248 L 432 268"></path>     
      <path d="M 184 304 L 438 318"></path>     
